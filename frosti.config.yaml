# 网站的基本信息
site:
  tab: TianLang Hacker # 浏览器标签栏上显示的文本
  title: TianLang Hacker # 网站的标题
  description: A clean, elegant, and fast static blog template! 🚀 Developed with Astro # 网站的描述，用于SEO等
  language: zh # 网站的语言，例如 "en" 是英文
  favicon: /image/favicon.svg # 网站的图标，用于浏览器标签栏和其他地方显示
  theme: # 更多主题 https://daisyui.com/docs/themes/
    light: winter # 主题的浅色模式
    dark: dracula # 主题的深色模式
    code: github-dark # 代码块的主题 https://shiki.style/themes
  date_format: YYYY年MM月DD日 dddd # 日期格式设置，支持自定义格式
  blog: # 博客相关配置
    pageSize: 10 # 每页显示的文章数量
  menu: # 菜单配置
    - id: home # 菜单项的唯一标识符
      text: 首页 # 菜单项显示的文本
      href: / # 菜单项链接的地址
      svg: "material-symbols:home-outline-rounded"
      target: _self
    - id: about
      text: 关于
      href: /about
      svg: "material-symbols:info-outline-rounded"
      target: _self
    - id: blog
      text: Blogs
      href: /blog
      svg: "material-symbols:book-2-outline-rounded"
      target: _self
      subItems:
        - id: all
          text: 所有blogs
          href: /blog
          svg: "material-symbols:ink-pen-outline-rounded"
          target: _self
        
        - id: Linux
          text: Linux
          href: /blog/category/Linux
          svg: "material-symbols:unknown-document-outline-rounded"
          target: _self
        
        - id: android
          text: Android
          href: /blog/category/Android
          svg: "material-symbols:deployed-code-outline"
          target: _self
        
        - id: nas
          text: NAS
          href: /blog/category/NAS
          svg: "material-symbols:deployed-code-outline"
          target: _self
        # 子菜单项配置
    - id: project
      text: 项目
      href: /project
      svg: "material-symbols:code-blocks-outline"
      target: _self
    - id: friend
      text: 友链
      href: /friend
      svg: "material-symbols:supervisor-account-outline-rounded"
      target: _self
