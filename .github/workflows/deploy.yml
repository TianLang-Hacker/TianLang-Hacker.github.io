name: Build and Deploy Astro Site to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v3
        with:
          node-version: 24
      - run: npm install --legacy-peer-deps
      - run: npm run build
      # 检查 dist 中的 symlink
      - name: Check for symlinks
        run: find dist -type l
      # 删除 dist 中所有 symlink，保证 deploy 成功
      - name: Remove symlinks from dist
        run: find dist -type l -exec rm -f {} +
      - uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      #  部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages