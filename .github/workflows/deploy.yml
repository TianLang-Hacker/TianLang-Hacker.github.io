name: Build and Deploy Astro Site to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# 注意：不需要 pages:write 权限了，改用 contents:write
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - uses: actions/setup-node@v3
        with:
          node-version: 24
      
      - run: npm install --legacy-peer-deps
      - run: npm run build
      
      # 清理 dist 文件夹（确保没有符号链接）
      - name: Clean dist folder
        run: |
          # 删除所有符号链接
          find dist -type l -delete
          
          # 添加 .nojekyll 文件（重要！）
          touch dist/.nojekyll
          
          # 可选：添加 CNAME 文件（如果你有自定义域名）
          # echo "your-domain.com" > dist/CNAME
          
          # 检查清理结果
          echo "Dist size: $(du -sh dist)"
          echo "File count: $(find dist -type f | wc -l)"
          echo "Symlink count: $(find dist -type l | wc -l)"
      
      # 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages  # 部署到 gh-pages 分支
          force_orphan: true        # 强制创建新的孤儿分支（可选）
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy to GitHub Pages: ${{ github.event.head_commit.message }}'