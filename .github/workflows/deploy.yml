name: Build and Deploy Astro Site to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v3
        with:
          node-version: 24
      - run: npm install --legacy-peer-deps
      - run: npm run build
      
      # 检查 dist 中的符号链接
      - name: Check for symlinks
        run: |
          echo "Checking for symlinks..."
          find dist -type l
      
      # 删除所有符号链接
      - name: Remove symlinks
        run: |
          find dist -type l -delete
          # 验证删除成功
          if find dist -type l | grep -q .; then
            echo "Still have symlinks!"
            exit 1
          fi
      
      # 检查文件夹大小（确保小于 10GB）
      - name: Check size
        run: |
          SIZE=$(du -sb dist | cut -f1)
          echo "Dist size: $SIZE bytes"
          if [ $SIZE -gt 10737418240 ]; then
            echo "Error: Dist size exceeds 10GB"
            exit 1
          fi
      
      # 列出文件结构（调试用）
      - name: List dist structure
        run: |
          find dist -type f | head -20
          echo "Total files: $(find dist -type f | wc -l)"
      
      - uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: dist
          # 如果文件太多，可以设置保留天数
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages
          # 增加超时时间（如果需要）
          timeout: 600000