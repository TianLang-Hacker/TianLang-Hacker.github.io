name: Build and Deploy Astro Site to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - uses: actions/setup-node@v3
        with:
          node-version: 24
      
      - run: npm install --legacy-peer-deps
      - run: npm run build
      
      # 彻底清理并重新打包
      - name: Clean and repack artifact
        run: |
          # 检查原始 dist
          echo "Original dist size:"
          du -sh dist
          
          # 创建清理后的目录
          mkdir -p dist_clean
          
          # 使用 rsync 复制并跟随符号链接
          sudo apt-get update
          sudo apt-get install -y rsync
          rsync -avL --no-links dist/ dist_clean/
          
          # 或者使用 cp
          # cp -rL dist/* dist_clean/
          
          # 验证没有符号链接
          echo "Checking for symlinks in cleaned dist..."
          if find dist_clean -type l | grep -q .; then
            echo "ERROR: Still has symlinks!"
            find dist_clean -type l
            exit 1
          fi
          
          # 检查文件大小
          SIZE=$(du -sb dist_clean | cut -f1)
          echo "Cleaned dist size: $SIZE bytes"
          if [ $SIZE -gt 10737418240 ]; then
            echo "ERROR: Size exceeds 10GB"
            exit 1
          fi
          
          # 替换原 dist
          rm -rf dist
          mv dist_clean dist
          
          # 最终验证
          echo "Final verification:"
          echo "Size: $(du -sh dist)"
          echo "Files: $(find dist -type f | wc -l)"
          echo "Symlinks: $(find dist -type l | wc -l)"
      
      - uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: dist
          # 如果文件很多，压缩上传
          if-no-files-found: error
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages
          timeout: 600000